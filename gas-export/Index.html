<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>KataKita CBT - Web Portal Terpadu GAS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- CDN Integrasi Font & Ikon Modern -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CDN Play Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            slate: {
              950: '#070b19',
            }
          }
        }
      }
    }
  </script>

  <style type="text/css">
    /* Reset Custom Scrollbar agar terlihat Modern di browser */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #080d1e;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #38bdf8;
    }

    /* Animasi Transisi Halus Halaman */
    .fade-in-view {
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Efek Glow Ornamen */
    .glow-box-sky {
      box-shadow: 0 0 15px -3px rgba(56, 189, 248, 0.12);
    }
    .glow-box-rose {
      box-shadow: 0 0 15px -3px rgba(244, 63, 94, 0.12);
    }
  </style>
</head>
<body class="bg-[#0b1329] text-slate-100 font-sans min-h-screen selection:bg-sky-500 selection:text-white flex flex-col justify-between overflow-x-hidden">

  <!-- Bagian Header Utama Aplikasi -->
  <header class="bg-[#111e42]/95 border-b border-sky-950/40 sticky top-0 z-50 backdrop-blur-md px-4 py-3 sm:px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-sky-400 to-indigo-600 flex items-center justify-center font-bold text-white shadow-lg shadow-sky-500/20 text-lg">
          KK
        </div>
        <div>
          <h1 class="text-xs sm:text-sm font-black text-white tracking-widest uppercase">KATAKITA</h1>
          <p class="text-[9px] font-mono font-bold tracking-wider text-sky-400 uppercase">Computer Assisted Test v1.2</p>
        </div>
      </div>
      
      <!-- User Account Info (Sisi Atas) -->
      <div id="header-user-badge" class="hidden flex items-center space-x-2 sm:space-x-3 bg-sky-950/40 px-3 py-1.5 rounded-full border border-sky-900/30">
        <img id="nav-user-photo" src="" alt="Avatar" class="w-6 h-6 sm:w-7 sm:h-7 rounded-full object-cover border border-sky-400/30">
        <div class="hidden sm:block text-left">
          <p id="nav-user-name" class="text-xs font-black text-slate-200 leading-none truncate max-w-[120px]"></p>
          <span id="nav-user-role" class="text-[8px] font-bold text-amber-400 uppercase"></span>
        </div>
        <button onclick="handleLogout()" class="text-xs text-rose-400 hover:text-rose-300 px-2 py-1 bg-rose-950/20 rounded hover:bg-rose-950/40 transition-all font-bold uppercase tracking-wider text-[9px] cursor-pointer">
          <i class="fa-solid fa-power-off"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Loader Sistem Utama -->
  <div id="full-system-loader" class="fixed inset-0 bg-[#0b1329] z-50 flex flex-col items-center justify-center p-4">
    <div id="loader-spinner" class="w-16 h-16 border-4 border-sky-900 border-t-sky-400 rounded-full animate-spin mb-4"></div>
    <h3 id="loader-title" class="text-xs font-mono tracking-widest text-sky-400 uppercase animate-pulse">Menghubungkan ke Google Sheets...</h3>
    <p id="loader-subtitle" class="text-[9px] text-slate-500 uppercase mt-2">Membaca file data ujian realtime</p>
    
    <!-- Bagian Pesan Kesalahan Koneksi (Diobati secara visual tanpa dialog alert yang memblokir iframe) -->
    <div id="loader-error-container" class="hidden max-w-md w-full mx-auto mt-6 p-5 bg-rose-950/20 border border-rose-900/40 rounded-2xl relative text-center">
      <div class="absolute top-0 left-0 right-0 h-0.5 bg-rose-500"></div>
      <div class="w-10 h-10 bg-rose-900/40 text-rose-400 rounded-full flex items-center justify-center mx-auto mb-3">
        <i class="fa-solid fa-triangle-exclamation text-lg"></i>
      </div>
      <h4 class="text-xs font-black text-rose-400 uppercase tracking-wider mb-2">Google Sheets Gagal Terhubung</h4>
      <p id="loader-error-text" class="text-[10px] text-slate-300 font-mono text-left whitespace-pre-wrap leading-relaxed max-h-48 overflow-y-auto mb-4 p-3 bg-black/35 rounded-lg border border-sky-950/10"></p>
      
      <div class="flex flex-col sm:flex-row gap-2 justify-center">
        <button onclick="syncGlobalData()" class="flex-1 px-3 py-2 bg-sky-600 hover:bg-sky-500 text-white rounded-lg text-[9px] font-black uppercase tracking-wider transition-all cursor-pointer">
          <i class="fa-solid fa-rotate mr-1"></i> Coba Hubungkan Lagi
        </button>
        <button onclick="dismissLoaderSimulate()" class="flex-1 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg text-[9px] font-black uppercase tracking-wider transition-all cursor-pointer">
          <i class="fa-solid fa-bolt mr-1"></i> Masuk Mode Simulasi
        </button>
      </div>
    </div>
  </div>

  <!-- Area Konten Dinamis yang di-routing oleh Router -->
  <main id="app-viewport" class="flex-grow flex flex-col justify-center max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
    <!-- Konten akan diinjeksikan secara dinamis di sini -->
  </main>

  <!-- Bagian Footer Penutup -->
  <footer class="bg-[#080d1e] py-4 border-t border-sky-9550/20 text-center">
    <p class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">
      © 2026 KATAKITA CBT • POWERED BY GOOGLE APPS SCRIPT & GOOGLE SHEETS DB
    </p>
  </footer>

  <!-- ==============================================
       TEMPLATES PORTAL LAYOUTS & COMPONENT BLOCKS
       ============================================== -->
  
  <!-- 1. Layout Portal Autentikasi (Masuk & Daftar) -->
  <template id="template-auth-portal">
    <div class="w-full max-w-sm mx-auto fade-in-view my-8">
      
      <!-- Header visual -->
      <div class="text-center mb-6">
        <h2 class="text-2xl font-black tracking-tight text-white uppercase sm:text-3xl">Pintu Akses CBT</h2>
        <p class="text-[10px] uppercase font-mono tracking-widest text-[#00ffcc] mt-1.5 font-bold">Tryout Terintegrasi KataKita</p>
      </div>

      <!-- Kotak Utama Card Autentikasi -->
      <div class="bg-[#111e42]/80 border border-sky-950 rounded-2xl p-6 sm:p-8 backdrop-blur shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-sky-400 via-indigo-500 to-[#00ffcc]"></div>
        
        <!-- Toggle Peran (Siswa vs Pengajar/Admin) -->
        <div class="flex bg-sky-950/50 p-1 rounded-xl mb-6 border border-sky-900/30">
          <button id="auth-role-student-btn" onclick="toggleAuthRole('student')" class="flex-1 py-1.5 text-xs font-black uppercase tracking-wider rounded-lg transition-all text-white bg-sky-600/60 cursor-pointer">
            <i class="fa-solid fa-graduation-cap mr-1"></i> Portal Siswa
          </button>
          <button id="auth-role-admin-btn" onclick="toggleAuthRole('admin')" class="flex-1 py-1.5 text-xs font-black uppercase tracking-wider rounded-lg transition-all text-slate-400 hover:text-white cursor-pointer">
            <i class="fa-solid fa-user-tie mr-1"></i> Admin / Guru
          </button>
        </div>

        <!-- Formulir Login -->
        <div id="auth-login-box">
          <form onsubmit="handleLoginSubmit(event)" class="space-y-4">
            <div>
              <label class="block text-[9px] font-black uppercase tracking-wider text-sky-400/80 mb-1" id="login-email-label">Masukan Alamat Email</label>
              <div class="relative">
                <span class="absolute left-3.5 top-3 text-slate-400 text-xs"><i class="fa-solid fa-envelope"></i></span>
                <input type="text" id="login-email" required placeholder="nama@email.com" class="w-full pl-10 pr-4 py-2.5 bg-sky-950/40 border border-sky-900/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-xs text-white">
              </div>
            </div>

            <div>
              <label class="block text-[9px] font-black uppercase tracking-wider text-sky-400/80 mb-1">Kata Sandi Akun</label>
              <div class="relative">
                <span class="absolute left-3.5 top-3 text-slate-400 text-xs"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="login-password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 bg-sky-950/40 border border-sky-900/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-xs text-white">
              </div>
            </div>

            <div id="auth-login-error" class="hidden p-3 bg-red-9550/30 border border-red-500/30 text-red-400 text-[10px] rounded-lg text-left font-bold uppercase tracking-wide">
              <!-- Pesan kegagalan login diinjeksikan disini -->
            </div>

            <button id="login-submit-btn" type="submit" class="w-full py-3 px-4 bg-sky-500 hover:bg-sky-400 text-white rounded-xl font-bold uppercase tracking-wider text-xs shadow-lg shadow-sky-500/10 cursor-pointer transition-all">
              <i class="fa-solid fa-door-open mr-1"></i> Masuk Sekarang
            </button>
          </form>

          <!-- Switcher Pendaftaran untuk Siswa -->
          <div id="register-trigger-box" class="mt-6 text-center">
            <p class="text-xs text-slate-400">Belum punya akun siswa?</p>
            <button onclick="switchAuthMode('register')" class="text-xs font-black text-[#00ffcc] hover:underline mt-1 cursor-pointer">
              <i class="fa-solid fa-user-plus mr-1"></i> Buat Akun Siswa Baru
            </button>
          </div>
        </div>

        <!-- Formulir Pendaftaran Siswa (Hanya untuk Siswa) -->
        <div id="auth-register-box" class="hidden">
          <form onsubmit="handleRegisterSubmit(event)" class="space-y-4">
            <div>
              <label class="block text-[9px] font-black uppercase tracking-wider text-sky-400/80 mb-1">Nama Lengkap Siswa</label>
              <div class="relative">
                <span class="absolute left-3.5 top-3 text-slate-400 text-xs"><i class="fa-solid fa-user"></i></span>
                <input type="text" id="reg-name" required placeholder="Bagus Supriyadi" class="w-full pl-10 pr-4 py-2.5 bg-sky-950/40 border border-sky-900/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-xs text-white">
              </div>
            </div>

            <div>
              <label class="block text-[9px] font-black uppercase tracking-wider text-sky-400/80 mb-1">Alamat Email Aktif</label>
              <div class="relative">
                <span class="absolute left-3.5 top-3 text-slate-400 text-xs"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" id="reg-email" required placeholder="bagus@gmail.com" class="w-full pl-10 pr-4 py-2.5 bg-sky-950/40 border border-sky-900/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-xs text-white">
              </div>
            </div>

            <div>
              <label class="block text-[9px] font-black uppercase tracking-wider text-sky-400/80 mb-1">Kata Sandi Baru</label>
              <div class="relative">
                <span class="absolute left-3.5 top-3 text-slate-400 text-xs"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="reg-password" required placeholder="Buat sandi minimal 6 karakter" class="w-full pl-10 pr-4 py-2.5 bg-sky-950/40 border border-sky-900/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-xs text-white">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-[9px] font-black uppercase tracking-wider text-sky-400/80 mb-1">Asal Sekolah</label>
                <input type="text" id="reg-school" required placeholder="SMA Negeri" class="w-full px-3 py-2.5 bg-sky-950/40 border border-sky-900/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-xs text-white">
              </div>
              <div>
                <label class="block text-[9px] font-black uppercase tracking-wider text-sky-400/80 mb-1">Nomor WhatsApp</label>
                <input type="text" id="reg-whatsapp" required placeholder="08..." class="w-full px-3 py-2.5 bg-sky-950/40 border border-sky-900/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-xs text-white">
              </div>
            </div>

            <div id="auth-reg-feedback" class="hidden p-3 rounded-lg text-left font-bold uppercase tracking-wide text-[10px]">
              <!-- Feedback pendaftaran diinjeksikan disini -->
            </div>

            <button id="reg-submit-btn" type="submit" class="w-full py-3 px-4 bg-[#00ffcc] hover:bg-[#00e3b4] text-slate-950 rounded-xl font-bold uppercase tracking-wider text-xs shadow-lg shadow-[#00ffcc]/10 cursor-pointer transition-all">
              <i class="fa-solid fa-user-plus mr-1"></i> Daftar Sekarang
            </button>
          </form>

          <div class="mt-6 text-center">
            <p class="text-xs text-slate-400">Sudah memiliki akun terdaftar?</p>
            <button onclick="switchAuthMode('login')" class="text-xs font-black text-sky-400 hover:underline mt-1 cursor-pointer">
              <i class="fa-solid fa-arrow-left-long mr-1"></i> Kembali ke Form Login
            </button>
          </div>
        </div>

      </div>
    </div>
  </template>

  <!-- 2. Layout Portal Dashboard Siswa (Home, CBT, Stats, Profile, Ranking) -->
  <template id="template-student-portal">
    <div class="fade-in-view w-full space-y-6">
      
      <!-- Top Sub-Tabs Navigation -->
      <div class="flex items-center space-x-2 border-b border-sky-950/40 pb-px overflow-x-auto select-none no-scrollbar">
        <button onclick="setStudentTab('home')" id="student-tab-home-btn" class="px-5 py-3 text-xs font-black uppercase tracking-widest border-b-2 border-sky-400 text-sky-400 whitespace-nowrap cursor-pointer transition-all">
          <i class="fa-solid fa-home mr-1.5"></i> Ringkasan Utama
        </button>
        <button onclick="setStudentTab('cbt')" id="student-tab-cbt-btn" class="px-5 py-3 text-xs font-black uppercase tracking-widest border-b-2 border-transparent text-slate-400 hover:text-white whitespace-nowrap cursor-pointer transition-all">
          <i class="fa-solid fa-desktop mr-1.5"></i> Paket Tryout CBT
        </button>
        <button onclick="setStudentTab('stats')" id="student-tab-stats-btn" class="px-5 py-3 text-xs font-black uppercase tracking-widest border-b-2 border-transparent text-slate-400 hover:text-white whitespace-nowrap cursor-pointer transition-all">
          <i class="fa-solid fa-chart-column mr-1.5"></i> Analisis SWOT & Skor
        </button>
        <button onclick="setStudentTab('profile')" id="student-tab-profile-btn" class="px-5 py-3 text-xs font-black uppercase tracking-widest border-b-2 border-transparent text-slate-400 hover:text-white whitespace-nowrap cursor-pointer transition-all">
          <i class="fa-solid fa-id-card mr-1.5"></i> Profil Akun Anda
        </button>
      </div>

      <!-- 1. TAB HOME (RINGKASAN UTAMA & RANKING) -->
      <div id="student-view-home" class="space-y-6">
        
        <!-- Greeting Header -->
        <div class="bg-gradient-to-r from-sky-9550/60 to-indigo-950/40 rounded-2xl p-6 border border-sky-900/30 glow-box-sky flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div>
            <span class="text-[9px] font-mono font-black text-sky-400 uppercase tracking-widest block mb-1">PROFIL BELAJAR AKTIF</span>
            <h2 class="text-xl sm:text-2xl font-black text-white" id="home-greeting-name">Selamat Datang, Siswa!</h2>
            <p class="text-xs text-slate-300 mt-1" id="home-greeting-info">Evaluasi Mandiri Komprehensif Berbasis Google Sheets Database</p>
          </div>
          <div class="bg-sky-900/30 px-4 py-2.5 rounded-xl border border-sky-800/20 text-left">
            <span class="text-[9px] font-bold text-slate-400 block uppercase">Integritas Ujian</span>
            <span class="text-[13px] font-black text-emerald-400 uppercase block mt-0.5"><i class="fa-solid fa-shield-halved mr-1"></i> 100% Jujur Lolos</span>
          </div>
        </div>

        <!-- Grid Quick Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <div class="bg-[#111e42]/60 p-4 rounded-xl border border-sky-950">
            <span class="text-[9px] text-[#00ffcc] font-black block uppercase tracking-wider">Rata-rata Nilai Anda</span>
            <span class="text-2xl font-mono font-black text-white block mt-1.5" id="stats-avg-score">0.00</span>
            <span class="text-[8px] text-slate-400 uppercase block mt-0.5">Skor Akun terhitung</span>
          </div>
          <div class="bg-[#111e42]/60 p-4 rounded-xl border border-sky-950">
            <span class="text-[9px] text-cyan-400 font-black block uppercase tracking-wider">Total Sub-Ujian</span>
            <span class="text-2xl font-mono font-black text-white block mt-1.5" id="stats-total-sectors">0</span>
            <span class="text-[8px] text-slate-400 uppercase block mt-0.5">Paket Aktif Tersedia</span>
          </div>
          <div class="bg-[#111e42]/60 p-4 rounded-xl border border-sky-950">
            <span class="text-[9px] text-indigo-400 font-black block uppercase tracking-wider">Dikerjakan Siswa</span>
            <span class="text-2xl font-mono font-black text-white block mt-1.5" id="stats-done-count">0</span>
            <span class="text-[8px] text-slate-400 uppercase block mt-0.5">Lembar Laporan Selesai</span>
          </div>
          <div class="bg-[#111e42]/60 p-4 rounded-xl border border-sky-950">
            <span class="text-[9px] text-amber-400 font-black block uppercase tracking-wider">Prakiraan Hasil</span>
            <span class="text-xs font-black text-amber-300 block mt-2.5 uppercase tracking-wide"><i class="fa-solid fa-circle-check"></i> DISARANKAN</span>
            <span class="text-[8px] text-slate-400 uppercase block mt-1">Lulus Kualifikasi Umum</span>
          </div>
        </div>

        <!-- Main Columns: SWOT & Leaderboard -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
          
          <!-- Left Column: SWOT Analysis Quick Panel -->
          <div class="lg:col-span-5 bg-[#111e42]/40 rounded-2xl p-5 border border-sky-950 space-y-4">
            <div class="border-b border-sky-950/60 pb-3">
              <h3 class="text-sm font-black text-white uppercase tracking-wider">Analisis Singkat SWOT Anda</h3>
              <p class="text-[10px] text-slate-400">Diagnosis kekuatan akademis berdasarkan nilai ujian masuk</p>
            </div>
            
            <div class="space-y-3">
              <!-- Strength -->
              <div class="p-3 bg-emerald-950/30 rounded-xl border border-emerald-500/15">
                <span class="text-[9px] text-emerald-300 font-bold tracking-widest block uppercase">STRENGTH (KEKUATAN UTAMA)</span>
                <p class="text-xs font-black text-slate-100 mt-1 truncate" id="swot-strength-label">-</p>
              </div>
              <!-- Weakness -->
              <div class="p-3 bg-rose-950/30 rounded-xl border border-rose-500/15">
                <span class="text-[9px] text-rose-300 font-bold tracking-widest block uppercase">WEAKNESS (BATASAN AKADEMIS)</span>
                <p class="text-xs font-black text-slate-100 mt-1 truncate" id="swot-weakness-label">-</p>
              </div>
            </div>
          </div>

          <!-- Right Column: Top Ranking Leaderboard -->
          <div class="lg:col-span-7 bg-[#111e42]/40 rounded-2xl p-5 border border-sky-950 space-y-4">
            <div class="flex justify-between items-center border-b border-sky-950/60 pb-3">
              <div>
                <h3 class="text-sm font-black text-white uppercase tracking-wider">Peringkat 5 Nilai Tertinggi</h3>
                <p class="text-[10px] text-slate-400">Kompetisi sehat seluruh siswa platform KataKita</p>
              </div>
              <span class="text-[9px] font-mono px-2 py-1 bg-sky-9550 rounded border border-sky-800/10 text-sky-400">REALTIME</span>
            </div>

            <div class="overflow-x-auto">
              <table class="w-full text-left text-xs text-slate-100">
                <thead>
                  <tr class="border-b border-sky-950 text-[9px] font-black uppercase text-slate-400 tracking-wider">
                    <th class="pb-2">Siswa</th>
                    <th class="pb-2 text-right">Skor Tertinggi</th>
                    <th class="pb-2 text-right">Integritas</th>
                  </tr>
                </thead>
                <tbody id="student-leaderboard-list" class="divide-y divide-sky-950/40">
                  <!-- Data diisi oleh JS -->
                </tbody>
              </table>
            </div>
          </div>

        </div>

      </div>

      <!-- 2. TAB CBT TRYOUT (DAFTAR SUB-UJIAN GURU & SISWA) -->
      <div id="student-view-cbt" class="hidden space-y-6">
        <div class="border-b border-sky-950/60 pb-2">
          <h3 class="text-lg font-black text-white uppercase tracking-wide">Katalog Paket Ujian Aktif</h3>
          <p class="text-xs text-slate-400">Silakan selesaikan paket ujian di bawah ini sesuai jadwal instruktur Anda</p>
        </div>

        <div id="student-package-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Card-card paket tryout dimuat oleh JS -->
        </div>
      </div>

      <!-- 3. TAB STATS (ANALISIS UTUH PERSENTASE) -->
      <div id="student-view-stats" class="hidden space-y-6">
        <div class="border-b border-sky-950/60 pb-2">
          <h3 class="text-lg font-black text-white uppercase tracking-wide">Analisis Lanjutan & SWOT Komprehensif</h3>
          <p class="text-xs text-slate-400">Laporan kekuatan internal (SWOT) yang dihitung dari rata-rata akurasi</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <!-- SWOT Left -->
          <div class="bg-[#111e42]/30 rounded-2xl p-5 border border-sky-950 space-y-4">
            <div class="flex items-center space-x-2 border-b border-sky-950 pb-2">
              <span class="w-2.5 h-2.5 rounded bg-emerald-400 block animate-pulse"></span>

      // PEMULIHAN MANDIRI: Set batas tunggu deteksi hang (5 detik). Jika Google Apps Script terhambat atau memblokir akses iframe:
      window.gasTimeoutId = setTimeout(() => {
        console.warn("Koneksi Google Apps Script mengambil waktu lebih lama (Batas 5s tercapai). Menampilkan opsi pemulihan...");

    function updateStudentHomeUI() {
      // Ambil data attempt milik siswa ini
      const myAttempts = state.attempts.filter(a => a.userId === state.currentUser.id);
      const doneCount = myAttempts.length;
      
      // Rata-rata nilai
      let totalScore = 0;
      myAttempts.forEach(a => totalScore += Number(a.score || 0));
      const avg = doneCount > 0 ? (totalScore / doneCount).toFixed(2) : '0.00';
      
      // Update ke DOM
      document.getElementById('stats-avg-score').textContent = avg;
      document.getElementById('stats-total-sectors').textContent = state.packages.length;
      document.getElementById('stats-done-count').textContent = doneCount;
      
      // Tentukan Sektor Terkuat & Terlemah
      let strongest = "Belum Ada Pengukuran";
      let weakest = "Belum Ada Pengukuran";
      if (doneCount > 0) {
        // Sort attempt dari tertinggi ke terendah
        const sorted = [...myAttempts].sort((a,b) => b.score - a.score);
        const strongestPackage = state.packages.find(p => p.id === sorted[0].packageId);
        if (strongestPackage) strongest = strongestPackage.title;
        
        const weakestPackage = state.packages.find(p => p.id === sorted[sorted.length-1].packageId);
        if (weakestPackage) weakest = weakestPackage.title;
      }
      
      document.getElementById('swot-strength-label').textContent = strongest;
      document.getElementById('swot-weakness-label').textContent = weakest;
      
      // Render Leaderboard Peringkat 5 Terbaik
      const leaderboardBody = document.getElementById('student-leaderboard-list');
      leaderboardBody.innerHTML = '';
      
      // Kalkulasi nilai per siswa
      const studentBestScores = {};
      state.attempts.forEach(a => {
        const sId = a.userId;
        const scoreVal = Number(a.score || 0);
        if (!studentBestScores[sId] || scoreVal > studentBestScores[sId]) {
          studentBestScores[sId] = scoreVal;
        }
      });
      
      // Typecast global users list to standard
      const rankingList = [];
      state.users.forEach(u => {
        if (u.role === 'student' && studentBestScores[u.id] !== undefined) {
          rankingList.push({
            user: u,
            score: studentBestScores[u.id]
          });
        }
      });
      
      // Urutkan nilai tertinggi
      rankingList.sort((a, b) => b.score - a.score);
      const top5 = rankingList.slice(0, 5);
      
      if (top5.length === 0) {
        leaderboardBody.innerHTML = `<tr><td colspan="3" class="py-4 text-center text-slate-500 uppercase font-mono text-[9px]">Siswa Belum Melaksanakan Ujian</td></tr>`;
      } else {
        top5.forEach((item, idx) => {
          const row = document.createElement('tr');
          row.className = "border-b border-sky-9550/10";
          row.innerHTML = `
            <td class="py-2.5 px-2 flex items-center space-x-2">
              <span class="font-mono text-amber-400 font-bold w-4">#${idx+1}</span>
              <img src="${item.user.photo || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80'}" class="w-6 h-6 rounded-full object-cover border border-sky-400/20">
              <div>
                <p class="font-bold text-white text-xs leading-none">${item.user.fullname}</p>
                <span class="text-[8px] text-slate-400 uppercase leading-none">${item.user.school}</span>
              </div>
            </td>
            <td class="py-2.5 text-right font-mono font-black text-[#00ffcc]">${item.score.toFixed(1)} Poin</td>
            <td class="py-2.5 text-right"><span class="text-[9px] font-bold text-emerald-400 bg-emerald-950/40 rounded px-1.5 py-0.5">LOLOS</span></td>
          `;
          leaderboardBody.appendChild(row);
        });
      }
    }

    function handleProfileUpdate(event) {
      event.preventDefault();
      const photo = document.getElementById('profile-photo-url').value.trim();
      const fullname = document.getElementById('profile-fullname').value.trim();
      const school = document.getElementById('profile-school').value.trim();
      const whatsapp = document.getElementById('profile-whatsapp').value.trim();
      const feedback = document.getElementById('profile-feedback');
      const submitBtn = document.getElementById('profile-submit-btn');
      
      feedback.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Menyinkronkan...';
      
      const updatedUser = {
        ...state.currentUser,
        fullname: fullname,
        school: school,
        photo: photo,
        whatsapp: whatsapp
      };
      
      google.script.run
        .withSuccessHandler((response) => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-1"></i> Simpan Pembaharuan Profil';
          
          if (response && response.success) {
            // Update di local storage dan local cache
            state.currentUser = updatedUser;
            localStorage.setItem('katakita_gas_user', JSON.stringify(updatedUser));
            
            const idx = state.users.findIndex(u => u.id === updatedUser.id);
            if (idx > -1) {
              state.users[idx] = updatedUser;
            }
            
            feedback.textContent = "Pengaturan Profil Anda sukses dijatuhkan ke Spreadsheet Google!";
            feedback.classList.remove('hidden');
            
            // Perbarui badge panggillan atas
            document.getElementById('nav-user-photo').src = updatedUser.photo;
            document.getElementById('nav-user-name').textContent = updatedUser.fullname;
          } else {
            alert("Gagal memperbarui profil: " + response.error);
          }
        })
        .withFailureHandler((err) => {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-1"></i> Simpan Pembaharuan Profil';
          alert("Hubungan error ke Sheets: " + err.toString());
        })
        .dbRegisterUser(updatedUser);
    }

      const targetLock = !currentLockStatus;

        .withSuccessHandler((response) => {
          button.disabled = false;
          if (response && response.success) {
            // local update
            const p = state.packages.find(pkg => pkg.id === packageId);
            if (p) {
              p.isLocked = targetLock;
            }
            updateAdminPackagesUI();

        })
        .withFailureHandler((err) => {
          button.disabled = false;
          alert("Error G-Sheet: " + err.toString());
        })
        .dbUpdatePackageLock(packageId, targetLock);
    }

        row.className = "border-b border-sky-9550/10";
        row.innerHTML = `
          <td class="py-3 px-2 font-mono text-[9px] text-slate-400">${a.timestampStr || '-'}</td>
          <td class="py-3">
            <div class="text-left leading-none">
              <strong class="text-xs text-white block mb-0.5">${sName}</strong>
              <span class="text-[9px] text-slate-500 uppercase">${sSchool}</span>
            </div>
          </td>
          <td class="py-3 text-[10px] text-slate-300 font-bold uppercase truncate max-w-[150px]" title="${pTitle}">${pTitle}</td>
          <td class="py-3 text-right font-mono font-black text-amber-400">${Number(a.score).toFixed(1)}</td>
          <td class="py-3 text-right font-mono text-slate-400">${acc}% Acc</td>
          <td class="py-3 text-center"><span class="text-[8.5px] font-black uppercase px-2 py-0.5 rounded ${integClass}">${a.integrityStatus || 'LOLOS'}</span></td>
          <td class="py-3 text-center">
            <button onclick="openAttemptDetailModal('${a.id}')" class="text-xs text-sky-400 hover:text-sky-300 font-bold uppercase cursor-pointer"><i class="fa-solid fa-file-lines"></i> ANALISIS</button>
          </td>
        `;
        body.appendChild(row);
      });
    }

    function openAttemptDetailModal(attemptId) {
      const a = state.attempts.find(att => att.id === attemptId);
      if (!a) return;
      
      const student = state.users.find(u => u.id === a.userId);
      const sName = student ? student.fullname : a.userId;
      const sSchool = student ? student.school : '';
      
      const pkg = state.packages.find(p => p.id === a.packageId);
      const pTitle = pkg ? pkg.title : a.packageId;
      
      document.getElementById('modal-student-subtitle').textContent = `Siswa: ${sName} (${sSchool}) • Paket: ${pTitle}`;
      
      // Render lembar jawaban pilihan berganda
      const container = document.getElementById('modal-scoll-questions-list');
      container.innerHTML = '';
      
      // Ambil list soal untuk paket ini
      const questionsList = state.questions.filter(q => q.packageId === a.packageId);
      let parsedAnswers = {};
      try {
        parsedAnswers = JSON.parse(a.answersJson || '{}');
      } catch(e) {
        parsedAnswers = {};
      }
      
      if (questionsList.length === 0) {
        container.innerHTML = `<div class="text-center font-mono py-4 text-xs text-slate-500">BUTIR BANK SOAL SUDAH DIAPUS OLEH GURU</div>`;
      } else {
        questionsList.forEach((q, idx) => {
          const selectedAns = parsedAnswers[q.id] || '(Kosong)';
          const isCorrect = selectedAns === q.correctAnswer;
          
          const div = document.createElement('div');
          div.className = `p-4 rounded-xl border ${isCorrect ? 'bg-[#0f2440]/30 border-emerald-500/10' : 'bg-[#29172c]/30 border-rose-500/10'} text-left space-y-2`;
          div.innerHTML = `
            <div class="flex justify-between text-[9px] font-black uppercase tracking-wider">
              <span class="text-slate-400">PERTANYAAN NOMOR: #${idx+1}</span>
              <span class="${isCorrect ? 'text-emerald-400' : 'text-rose-400'}">${isCorrect ? '✓ JAWABAN BENAR' : '❌ SALAH / KOSONG'}</span>
            </div>
            <p class="text-xs text-slate-200 mt-1">${q.question}</p>
            <div class="grid grid-cols-2 gap-2 text-[10px] text-slate-400 pt-1">
              <div>Opsi Terpilih Siswa: <strong class="text-white">${selectedAns}</strong></div>
              <div>Kunci Kualifikasi: <strong class="text-emerald-400">${q.correctAnswer}</strong></div>
            </div>
            <p class="text-[9.5px] text-slate-400 mt-1 border-t border-sky-9550/40 pt-1 font-mono italic"><strong class="text-slate-300">Pembahasan:</strong> ${q.explanation || '-'}</p>
          `;
          container.appendChild(div);
        });
      }
      
      document.getElementById('admin-attempt-modal').classList.remove('hidden');
    }

    function closeAttemptModal() {
      document.getElementById('admin-attempt-modal').classList.add('hidden');
    }

    /**
     * ----------------------------------------------------
     * ARENA AKTIF TRYOUT CBT PLAYER (EXAM RUNTIME)
     * ----------------------------------------------------
     */
    function startActiveCbtExam(packageId) {
      if (!confirm("Konfirmasi Keamanan: Apakah Anda siap memulai sesi sub-ujian ini?\nTimer pengerjaan akan segera diaktifkan otomatis.")) {
        return;
      }
      
      const pkg = state.packages.find(p => p.id === packageId);
      if (!pkg) return;
      
      state.activePackageId = packageId;
      state.activeQuestions = state.questions.filter(q => q.packageId === packageId);
      state.playerCurrentIndex = 0;
      state.playerAnswers = {};
      state.playerRagu = {};
      state.playerInterruptionCount = 0;
      
      if (state.activeQuestions.length === 0) {
        alert("Maaf, sub-ujian ini belum diisi bank soal oleh instruktur!");
        return;
      }
      
      // Set Sisa Durasi Menit ke Detik
      const durationMinutes = Number(pkg.duration || 15);
      state.playerSecondsLeft = durationMinutes * 60;
      
      // Pindah Tampilan ke Arena CBT player
      navigate('player');
      
      // Keamanan fokus window
      startCbtCountdown();
      
      // Mulai listener anti-kecurangan tab defocus
      startCbtAntiCheatListener();
    }

    function renderPlayerView(container) {
      const tpl = document.getElementById('template-tryout-player').content.cloneNode(true);
      container.appendChild(tpl);
      
      // Load status display soal
      updatePlayerQuestionUI();
    }

    // Format Countdown Timer
    function startCbtCountdown() {
      if (state.playerTimerInterval) clearInterval(state.playerTimerInterval);
      
      const timerDisplay = document.getElementById('cbt-timer-display');
      
      state.playerTimerInterval = setInterval(() => {
        state.playerSecondsLeft--;
        
        if (state.playerSecondsLeft <= 0) {
          clearInterval(state.playerTimerInterval);
          state.playerSecondsLeft = 0;
          alert("Waktu pengerjaan tryout Anda telah habis! Formulir lembar pengerjaan dikirim otomatis ke guru.");
          autoSubmitExam();
        }
        
        // Format Display HH:MM:SS
        const hr = Math.floor(state.playerSecondsLeft / 3600);
        const mn = Math.floor((state.playerSecondsLeft % 3600) / 60);
        const sc = state.playerSecondsLeft % 60;
        
        const pad = (num) => num.toString().padStart(2, '0');
        timerDisplay.textContent = `${pad(hr)}:${pad(mn)}:${pad(sc)}`;
      }, 1000);
    }

    function updatePlayerQuestionUI() {
      const currentQ = state.activeQuestions[state.playerCurrentIndex];
      if (!currentQ) return;
      
      const pkg = state.packages.find(p => p.id === state.activePackageId);
      document.getElementById('player-materi-title').textContent = pkg ? pkg.title : 'SUB-UJIAN';
      
      // Indicator deskripsi soal
      document.getElementById('player-question-indicator').textContent = `Soal ${state.playerCurrentIndex + 1} dari ${state.activeQuestions.length}`;
      
      // Teks pertanyaan
      document.getElementById('player-question-text').textContent = currentQ.question;
      
      // Muat Teks Opsi Pilihan Ganda
      document.getElementById('label-opt-A').textContent = currentQ.optionA;
      document.getElementById('label-opt-B').textContent = currentQ.optionB;
      document.getElementById('label-opt-C').textContent = currentQ.optionC;
      document.getElementById('label-opt-D').textContent = currentQ.optionD;
      
      // Update styling tomobol opsi aktif
      const chosenOpt = state.playerAnswers[currentQ.id];
      ['A', 'B', 'C', 'D'].forEach(opt => {
        const btn = document.getElementById(`btn-opt-${opt}`);
        const span = btn.querySelector('span');
        if (chosenOpt === opt) {
          btn.className = "w-full text-left p-4 rounded-xl border border-sky-400 bg-sky-950/80 text-xs font-bold text-white transition-all flex items-center space-x-3 cursor-pointer group glow-box-sky";
          span.className = "w-7 h-7 rounded-lg bg-sky-400 flex items-center justify-center font-bold font-mono text-slate-950 border border-sky-400";
        } else {
          btn.className = "w-full text-left p-4 rounded-xl border border-sky-9550/40 bg-[#111e42]/30 hover:bg-[#111e42]/60 text-xs font-medium text-slate-200 transition-all flex items-center space-x-3 cursor-pointer group";
          span.className = "w-7 h-7 rounded-lg bg-sky-950 border border-sky-900 group-hover:bg-sky-900/40 flex items-center justify-center font-bold font-mono text-sky-400";
        }
      });
      
      // Tombol arrows disabled checking
      document.getElementById('player-prev-btn').disabled = state.playerCurrentIndex === 0;
      
      // Update styling tombol Ragu
      const isRagu = state.playerRagu[currentQ.id] || false;
      const raguBtn = document.getElementById('player-ragu-btn');
      if (isRagu) {
        raguBtn.className = "px-4 py-2 bg-amber-500 text-slate-950 rounded-lg text-xs font-black uppercase tracking-wider transition-all cursor-pointer shadow-lg shadow-amber-500/20";
      } else {
        raguBtn.className = "px-4 py-2 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-lg text-xs font-black uppercase tracking-wider hover:bg-amber-500/30 transition-all cursor-pointer";
      }
      
      // Render peta navigasi grid nomor
      renderPlayerGridNumbers();
    }

    function selectPlayerOption(optLetter) {
      const currentQ = state.activeQuestions[state.playerCurrentIndex];
      if (!currentQ) return;
      
      state.playerAnswers[currentQ.id] = optLetter;
      updatePlayerQuestionUI();
    }

    function togglePlayerRagu() {
      const currentQ = state.activeQuestions[state.playerCurrentIndex];
      if (!currentQ) return;
      
      state.playerRagu[currentQ.id] = !(state.playerRagu[currentQ.id] || false);
      updatePlayerQuestionUI();
    }

    function playerNextQuestion() {
      if (state.playerCurrentIndex < state.activeQuestions.length - 1) {
        state.playerCurrentIndex++;
        updatePlayerQuestionUI();
      }
    }

    function playerPrevQuestion() {
      if (state.playerCurrentIndex > 0) {
        state.playerCurrentIndex--;
        updatePlayerQuestionUI();
      }
    }

    // Loncat langsung ke nomor
    function jumpPlayerToQuestion(idx) {
      state.playerCurrentIndex = idx;
      updatePlayerQuestionUI();
    }

    function renderPlayerGridNumbers() {
      const grid = document.getElementById('cbt-numbers-grid');
      grid.innerHTML = '';
      
      state.activeQuestions.forEach((q, idx) => {
        const isCurrent = idx === state.playerCurrentIndex;
        const ans = state.playerAnswers[q.id];
        const isR = state.playerRagu[q.id] || false;
        
        let btnClass = "bg-[#111e42]/50 border border-sky-900 hover:bg-sky-900 text-slate-300";
        if (isCurrent) {
          btnClass = "bg-sky-500 text-white font-bold animate-pulse ring-2 ring-sky-300 ring-offset-2 ring-offset-slate-950";
        } else if (isR) {
          btnClass = "bg-amber-500 text-slate-950 font-bold";
        } else if (ans) {
          btnClass = "bg-emerald-600 text-white font-black";
        }
        
        const btn = document.createElement('button');
        btn.onclick = () => jumpPlayerToQuestion(idx);
        btn.className = `py-2 rounded-lg text-xs font-semibold cursor-pointer transition-all ${btnClass}`;
        btn.textContent = idx + 1;
        
        grid.appendChild(btn);
      });
    }

    /**
     * Anti-Cheat Detection Monitor (Fokus Window)
     */
    function startCbtAntiCheatListener() {
      // Reset window focus monitoring
      window.onblur = () => {
        if (state.currentView === 'player') {
          state.playerInterruptionCount++;
          alert(`⚠️ PEMBERITAHUAN PELANGGARAN KOTAK SCREEN!\nAnda dilarang membuka tab lain, melakukan screenshot, maupun mematikan fokus portal.\nPelanggaran Terdeteksi: Ke-${state.playerInterruptionCount}`);
        }
      };
    }

    function submitExamWithConfirmation() {
      const unansweredCount = state.activeQuestions.filter(q => !state.playerAnswers[q.id]).length;
      let confirmMsg = "Apakah Anda percaya dengan semua jawaban Anda dan ingin menyudahi ujian CBT untuk dikirim?";
      
      if (unansweredCount > 0) {
        confirmMsg = `⚠️ PERINGATAN: Ada ${unansweredCount} butir pertanyaan yang BELUM DIJAWAB!\nApakah Anda tetap ingin mengakhiri sesi pengerjaan ujian dan mengirim laporan nilai?`;
      }
      
      if (confirm(confirmMsg)) {
        autoSubmitExam();
      }
    }

    // Eksekusi Pengiriman data ke Sheet asinkron
    function autoSubmitExam() {
      // Hentikan timer & bersihkan monitoring
      if (state.playerTimerInterval) clearInterval(state.playerTimerInterval);
      state.playerTimerInterval = null;
      window.onblur = null;
      
      showLoader(true);
      
      // Kalkulasi Skor Akhir
      let correct = 0;
      let wrong = 0;
      
      state.activeQuestions.forEach(q => {
        const userChoice = state.playerAnswers[q.id];
        if (userChoice === q.correctAnswer) {
          correct++;
        } else {
          wrong++;
        }
      });
      
      const totalQuestions = state.activeQuestions.length;
      const rawScore = totalQuestions > 0 ? (correct / totalQuestions) * 100 : 0;
      
      // Status Integritas
      let integrity = "100% LOLOS";
      if (state.playerInterruptionCount > 0) {
        integrity = `INTERUPSI-${state.playerInterruptionCount}x`;
      }
      
      const timestamp = new Date();
      const dateStr = timestamp.toLocaleDateString('id-ID') + ' ' + timestamp.toLocaleTimeString('id-ID');
      
      const newAttempt = {
        id: 'ATT-' + Math.floor(10000 + Math.random() * 9000).toString(),
        userId: state.currentUser.id,
        packageId: state.activePackageId,
        answersJson: state.playerAnswers,
        score: rawScore,
        correct: correct,
        wrong: wrong,
        timestampStr: dateStr,
        integrityStatus: integrity,
        isSubmitted: true
      };
      
      // Kirim data attempt ke Google Sheets secara realtime!
      google.script.run
        .withSuccessHandler((response) => {
          showLoader(false);
          
          if (response && response.success) {
            alert("Lembar ujian Anda sukses terunggah dalam Google Sheet pusat!");
            
            // Update local memory attempt caches
            state.attempts.push(newAttempt);
            
            // Arahkan ke stats home portal
            state.studentTab = 'home';
            navigate('student');
          } else {
            alert("Peringatan: Gagal mengirim lembar attempt ke spreadsheet (" + response.error + ")");
            // Fallback untuk siswa agar tidak stres, kembalikan ke student tab
            state.studentTab = 'home';
            navigate('student');
          }
        })
        .withFailureHandler((err) => {
          showLoader(false);
          alert("Hubungan pengiriman attempt ke Google Sheets gagal: " + err.toString());
          state.studentTab = 'home';
          navigate('student');
        })
        .dbSaveAttempt(newAttempt);
    }
  </script>
</body>
</html>
